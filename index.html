// ═══════════════════════════════════════════════════════
// PONTUAÇÃO REAL (começa do 0, meta ~2200 XP = 60 pts)
// ═══════════════════════════════════════════════════════
function estScore(xp){
  if(xp===0) return 0;
  var score = Math.round(Math.pow(xp, 0.65) * 0.35);
  return Math.min(score, 110);
}
function detLevel(score){
  if(score<35)return"A1"; if(score<55)return"A2";
  if(score<75)return"B1"; if(score<95)return"B2";
  if(score<115)return"C1"; return"C2";
}
function xpToReach60(){
  // inverse: 60 = 0.35 * xp^0.65 => xp = (60/0.35)^(1/0.65) ≈ 2250
  return 2250;
}

var ST   = {fontSize:12,fontWeight:700,color:C.accent,letterSpacing:1.5,marginBottom:14,textTransform:"uppercase"};

function Btn(props){
  var v=props.variant||"primary";
  var base={padding:"12px 26px",borderRadius:12,border:"none",cursor:"pointer",
    fontWeight:700,fontSize:15,transition:"all .2s",outline:"none",
    background:v==="primary"?C.accent:v==="ghost"?"transparent":C.border,
    color:v==="primary"?"#07091a":C.text};
  if(v==="ghost") base.border="1px solid "+C.border;
  return h("button",{style:Object.assign({},base,props.style||{}),onClick:props.onClick,disabled:props.disabled||false},props.children);
}

function PBar(pct,col){
  col=col||C.accent;
  return h("div",{style:{height:8,borderRadius:4,background:C.border,overflow:"hidden",marginBottom:14}},
    h("div",{style:{height:"100%",width:Math.min(pct,100)+"%",background:col,borderRadius:4,transition:"width .6s"}}));
}

function ResultCard(correct,total,onContinue,xpReward){
  var ok=correct>=total*.7;
  return h("div",{className:"bi"},
    h("div",{style:Object.assign({},CARD,{background:ok?"#16a34a22":"#dc262622",
      border:"1px solid "+(ok?C.green:C.red),textAlign:"center",marginBottom:16})},
      h("div",{style:{fontSize:40,marginBottom:8}},ok?"🎯":"📚"),
      h("div",{style:{fontSize:22,fontWeight:800,color:ok?C.green:C.red}},correct+"/"+total+" corretas"),
      h("div",{style:{fontSize:13,color:C.muted,marginTop:4}},
        ok?"Ótimo trabalho! Continue assim.":"Revise os erros e tente novamente.")
    ),
    h(Btn,{onClick:onContinue},"+"+xpReward+" XP · Continuar →")
  );
}

function ReadSelect(props){

  var timer=useRef(null);

    timer.current=setInterval(function(){

    },1000);
    return function(){clearInterval(timer.current);};
  },[]);
  function toggle(w){if(done)return;setSel(function(s){var n=Object.assign({},s);n[w]=!n[w];return n;});}
  function submit(){clearInterval(timer.current);setDone(true);}
  var correct=words.filter(function(x){return x.r&&sel[x.w];}).length;
  var total=words.filter(function(x){return x.r;}).length;
  var wrong=words.filter(function(x){return !x.r&&sel[x.w];}).length;
  var score=Math.max(0,correct-wrong);

    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},

    ),

          else if(item.r&&!s){bg="#dc262622";bo=C.red;co=C.red;}
          else if(!item.r&&s){bg="#dc262622";bo=C.red;co=C.red;}
          else{bg=C.surface;bo=C.border;co=C.muted;}
        }
        return h("button",{key:item.w+i,onClick:function(){toggle(item.w);},

            background:bg,color:co,fontWeight:600,fontSize:15,cursor:"pointer",transition:"all .15s"}},item.w);
      })
    ),
    !done?h(Btn,{onClick:submit},"Verificar →")
      :h("div",{className:"bi"},
        h("div",{style:Object.assign({},CARD,{background:score>=total*.7?"#16a34a22":"#dc262622",
          border:"1px solid "+(score>=total*.7?C.green:C.red),textAlign:"center",marginBottom:16})},
          h("div",{style:{fontSize:36,marginBottom:8}},score>=total*.7?"🎯":"📚"),
          h("div",{style:{fontSize:20,fontWeight:800,color:score>=total*.7?C.green:C.red}},score+"/"+total+" corretas"),
          h("div",{style:{fontSize:13,color:C.muted,marginTop:4}},correct+" acertos · "+wrong+" erros")

  var _s2=useState(0);        var idx=_s2[0];     var setIdx=_s2[1];
  var _s3=useState([]);       var built=_s3[0];   var setBuilt=_s3[1];
  var _s4=useState(null);     var bank=_s4[0];    var setBank=_s4[1];
  var _s5=useState(false);    var checked=_s5[0]; var setChecked=_s5[1];
  var _s6=useState([]);       var results=_s6[0]; var setResults=_s6[1];
  var finished=idx>=qs.length;
  var q=qs[idx]||{words:[],answer:"",tip:""};

  // init bank on question change
  useEffect(function(){
    setBuilt([]);
    setBank(shuffle(q.words));
    setChecked(false);
  },[idx,qs]);

  function addWord(i){
    if(checked||bank===null)return;
    var w=bank[i];
    setBuilt(function(b){return b.concat([w]);});
    setBank(function(b){var n=b.slice();n.splice(i,1);return n;});
  }
  function removeWord(i){
    if(checked)return;
    var w=built[i];
    setBuilt(function(b){var n=b.slice();n.splice(i,1);return n;});
    setBank(function(b){return b.concat([w]);});
  }
  function checkAnswer(){
    if(built.length===0)return;
    var attempt=built.join(" ");
    var ok=attempt.toLowerCase()===q.answer.toLowerCase();
    setChecked(true);
    setResults(function(r){return r.concat([{ok:ok,attempt:attempt,answer:q.answer}]);});
  }
  function next(){setIdx(function(i){return i+1;});}

  if(finished||bank===null){
    if(!finished) return h("div",null,"Carregando...");
    var okCount=results.filter(function(r){return r.ok;}).length;
    return h("div",{className:"fi",style:CARD},
      h("div",{style:ST},"🔀 Resultado — Word Order"),
      h("div",{style:{textAlign:"center",margin:"24px 0"}},
        h("div",{style:{fontSize:48}},okCount>=4?"🌟":"📚"),
        h("div",{style:{fontSize:32,fontWeight:900,color:"#34d399",marginTop:8}},okCount+"/"+qs.length),
        h("div",{style:{fontSize:14,color:C.muted}},"frases ordenadas corretamente")
      ),
      results.map(function(r,i){
        return h("div",{key:i,style:{marginBottom:10,padding:"12px 14px",borderRadius:10,
          background:r.ok?"#16a34a18":"#dc262618",border:"1px solid "+(r.ok?"#16a34a33":"#dc262633")}},
          !r.ok&&h("div",{style:{fontSize:12,color:C.red,marginBottom:4}},"✗ Sua resposta: "+r.attempt),
          h("div",{style:{fontSize:13,color:r.ok?C.green:C.muted}},(r.ok?"✓ ":"")+r.answer));
      }),
      h(Btn,{style:{marginTop:16},onClick:function(){props.onDone(30);}},"+30 XP · Continuar →")
    );
  }

  var isOk=checked&&results.length>0?results[results.length-1].ok:null;
  return h("div",{className:"fi"},h("div",{style:CARD},
    h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:12}},
      h("div",{style:Object.assign({},ST,{color:"#34d399"})},"🔀 Word Order"),
      h("span",{style:{fontSize:13,color:C.muted}},idx+1+"/"+qs.length)
    ),
    PBar((idx/qs.length)*100,"#34d399"),
    h("div",{style:{padding:"16px 0"}},
      h("div",{style:{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:1,marginBottom:12}},
        "CLIQUE NAS PALAVRAS PARA MONTAR A FRASE:"),
      // Built sentence
      h("div",{style:{minHeight:56,padding:"12px 16px",borderRadius:12,marginBottom:16,
        background:C.surface,border:"1.5px solid "+(checked?(isOk?C.green:C.red):C.border),
        display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}},
        built.length===0?h("span",{style:{color:C.muted,fontSize:14}},"Clique nas palavras abaixo...")
          :built.map(function(w,i){
            return h("button",{key:w+i,onClick:function(){if(!checked)removeWord(i);},
              style:{padding:"6px 12px",borderRadius:8,border:"1.5px solid "+C.accent,
                background:C.accent+"22",color:C.accent,fontWeight:600,fontSize:15,
                cursor:checked?"default":"pointer"}},w);
          })
      ),
      // Word bank
      !checked&&h("div",{style:{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}},
        bank.map(function(w,i){
          return h("button",{key:w+i,onClick:function(){addWord(i);},
            style:{padding:"8px 16px",borderRadius:10,border:"1.5px solid "+C.border,
              background:C.surface,color:C.text,fontWeight:600,fontSize:15,cursor:"pointer",
              transition:"all .15s"}},w);
        })
      ),
      checked&&h("div",{style:{marginBottom:16,padding:"14px 16px",borderRadius:12,
        background:isOk?"#16a34a18":"#dc262618",border:"1px solid "+(isOk?"#16a34a33":"#dc262633")}},
        isOk
          ?h("span",{style:{color:C.green,fontWeight:700}},"✓ Perfeito! Frase correta!")
          :h("div",null,
            h("div",{style:{color:C.red,fontWeight:700,marginBottom:6}},"✗ Não foi dessa vez"),
            h("div",{style:{fontSize:13,color:C.text}},"Correto: ",
              h("strong",{style:{color:C.accent}},q.answer))
          ),
        h("div",{style:{fontSize:12,color:C.blue,marginTop:8}},"💡 "+q.tip)
      )
    ),
    !checked
      ?h(Btn,{onClick:checkAnswer,style:{opacity:built.length===0?.5:1,pointerEvents:built.length===0?"none":"auto"}},"Verificar")
      :h(Btn,{onClick:next},idx===qs.length-1?"Ver resultado →":"Próxima →")
  ));
}

// ═══════════════════════════════════════════════════════
// WRITING
// ═══════════════════════════════════════════════════════
function Writing(props){
  var _s1=useState(rnd(PROMPTS));  var prompt=_s1[0];
  var _s2=useState("");            var text=_s2[0];    var setText=_s2[1];
  var _s3=useState(false);         var loading=_s3[0]; var setLoading=_s3[1];
  var _s4=useState(null);          var feedback=_s4[0];var setFeedback=_s4[1];
  var _s5=useState(localStorage.getItem("det_key")||""); var apiKey=_s5[0]; var setApiKey=_s5[1];
  var _s6=useState(!localStorage.getItem("det_key"));    var showKey=_s6[0]; var setShowKey=_s6[1];
  var wc=text.trim().split(/\s+/).filter(Boolean).length;
  function saveKey(){localStorage.setItem("det_key",apiKey);setShowKey(false);}
  function getFeedback(){
    if(wc<30||!apiKey)return;
    setLoading(true);
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,
        "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:900,
        system:'Avaliador DET. Aluno brasileiro, meta 60 pts. Retorne SOMENTE JSON: {"score":1-5,"level":"B1","summary":"2 frases em pt-br","strengths":["s1","s2"],"improvements":["i1","i2","i3"],"corrected":"frase melhorada"}',
        messages:[{role:"user",content:'Prompt: "'+prompt+'"\nResposta: "'+text+'"'}]})
    }).then(function(r){return r.json();})
    .then(function(d){
      var raw=(d.content||[]).find(function(b){return b.type==="text";});
      raw=raw?raw.text:"{}";
      setFeedback(JSON.parse(raw.replace(/```json|```/g,"").trim()));
      setLoading(false);
    }).catch(function(){
      setFeedback({score:2,level:"B1",summary:"Erro ao conectar. Verifique sua API key.",strengths:[],improvements:[],corrected:""});
      setLoading(false);
    });
  }
  return h("div",{className:"fi"},h("div",{style:CARD},
    h("div",{style:ST},"🖊 Writing Practice"),
    showKey&&h("div",{style:Object.assign({},CARD,{background:"#1a1f2e",border:"1px solid "+C.yellow+"44",marginBottom:16})},
      h("div",{style:{fontSize:13,color:C.yellow,fontWeight:700,marginBottom:6}},"🔑 API Key Anthropic (para feedback de IA)"),
      h("div",{style:{fontSize:12,color:C.muted,marginBottom:10}},"Obtenha em ",
        h("a",{href:"https://console.anthropic.com",target:"_blank",style:{color:C.blue}},"console.anthropic.com"),
        " → API Keys"),
      h("div",{style:{display:"flex",gap:8}},
        h("input",{value:apiKey,onChange:function(e){setApiKey(e.target.value);},
          placeholder:"sk-ant-...",type:"password",
          style:{flex:1,padding:"10px 14px",borderRadius:10,background:C.surface,
            border:"1px solid "+C.border,color:C.text,fontSize:13,outline:"none"}}),
        h(Btn,{style:{padding:"10px 16px",fontSize:13},onClick:saveKey},"Salvar")
      ),
      h(Btn,{variant:"ghost",style:{marginTop:8,padding:"6px 14px",fontSize:12},onClick:function(){setShowKey(false);}},"Pular")
    ),
    h("div",{style:Object.assign({},CARD,{background:"#0d1a2e",border:"1px solid #1e3a5f",marginBottom:16})},
      h("div",{style:{fontSize:11,color:C.blue,fontWeight:700,letterSpacing:1,marginBottom:8}},"PROMPT"),
      h("div",{style:{fontSize:16,lineHeight:1.7,fontStyle:"italic"}},'"'+prompt+'"')
    ),
    !feedback
      ?h("div",null,
          h("textarea",{value:text,onChange:function(e){setText(e.target.value);},
            placeholder:"Escreva sua resposta em inglês aqui... (mínimo 50 palavras)",
            style:{width:"100%",minHeight:160,padding:"14px 16px",background:C.surface,
              border:"1.5px solid "+C.border,borderRadius:12,color:C.text,fontSize:15,
              lineHeight:1.7,outline:"none",resize:"vertical",marginBottom:8}}),
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("div",{style:{display:"flex",gap:12,alignItems:"center"}},
              h("span",{style:{fontSize:12,color:wc>=50?C.green:C.muted}},wc+" palavras"+(wc>=50?" ✓":"")),
              !showKey&&h("button",{onClick:function(){setShowKey(true);},
                style:{background:"none",border:"1px solid "+C.border,color:C.muted,
                  padding:"4px 10px",borderRadius:8,fontSize:11,cursor:"pointer"}},"🔑 API Key")
            ),
            h(Btn,{onClick:getFeedback,style:{opacity:wc<30||loading?.5:1,pointerEvents:wc<30||loading?"none":"auto"}},
              loading?"Analisando...":"Avaliar com IA →")
          )
        )
      :h("div",{className:"fi"},
          h("div",{style:Object.assign({},CARD,{background:"linear-gradient(135deg,#0d1a2e,#111a35)",
            border:"1px solid rgba(34,211,160,.2)",textAlign:"center",marginBottom:16})},
            h("div",{style:{fontSize:36,marginBottom:8}},["","😕","🙂","👍","🌟","🚀"][feedback.score||3]),
            h("div",{style:{fontSize:28,fontWeight:900,color:C.accent}},feedback.level),
            h("div",{style:{display:"flex",justifyContent:"center",gap:4,margin:"6px 0"}},
              [1,2,3,4,5].map(function(n){return h("span",{key:n,style:{fontSize:20,opacity:n<=(feedback.score||3)?1:.2}},"★");})),
            h("div",{style:{fontSize:14,lineHeight:1.6,maxWidth:480,margin:"0 auto"}},feedback.summary)
          ),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}},
            h("div",{style:Object.assign({},CARD,{background:"#16a34a18",border:"1px solid #16a34a33"})},
              h("div",{style:{fontSize:11,color:C.green,fontWeight:700,letterSpacing:1,marginBottom:10}},"✓ PONTOS FORTES"),
              (feedback.strengths||[]).map(function(s,i){return h("div",{key:i,style:{fontSize:13,marginBottom:6}},"• "+s);})),
            h("div",{style:Object.assign({},CARD,{background:"#dc262618",border:"1px solid #dc262633"})},
              h("div",{style:{fontSize:11,color:C.red,fontWeight:700,letterSpacing:1,marginBottom:10}},"↑ MELHORAR"),
              (feedback.improvements||[]).map(function(s,i){return h("div",{key:i,style:{fontSize:13,marginBottom:6}},"• "+s);}))
          ),
          feedback.corrected&&h("div",{style:Object.assign({},CARD,{background:"#1a1f2e",marginBottom:16})},
            h("div",{style:{fontSize:11,color:C.purple,fontWeight:700,letterSpacing:1,marginBottom:8}},"✏️ FRASE MELHORADA"),
            h("div",{style:{fontSize:14,fontStyle:"italic",lineHeight:1.6}},'"'+feedback.corrected+'"')
          ),
          h("div",{style:{display:"flex",gap:12}},
            h(Btn,{variant:"ghost",onClick:function(){setText("");setFeedback(null);}},"Tentar novamente"),
            h(Btn,{onClick:function(){props.onDone(50);}},"+50 XP · Concluir →")
          )
        )
  ));
}

// ═══════════════════════════════════════════════════════
// TIPS
// ═══════════════════════════════════════════════════════
function Tips(props){
  return h("div",{className:"fi"},
    h("div",{style:Object.assign({},CARD,{marginBottom:16})},
      h("div",{style:ST},"💡 Estratégias para o DET"),
      h("div",{style:{fontSize:14,color:C.muted,lineHeight:1.7}},
        "O DET testa rapidez, gramática e vocabulário. Use estas técnicas para maximizar sua pontuação:")
    ),
    TIPS.map(function(tip,i){
      return h("div",{key:i,className:"fi",style:Object.assign({},CARD,{borderLeft:"3px solid "+tip.col})},
        h("div",{style:{display:"flex",gap:14,alignItems:"flex-start"}},
          h("div",{style:{fontSize:24,width:42,height:42,display:"flex",alignItems:"center",
            justifyContent:"center",background:tip.col+"18",borderRadius:10,flexShrink:0}},tip.icon),
          h("div",null,
            h("div",{style:{fontSize:15,fontWeight:700,color:tip.col,marginBottom:6}},tip.title),
            h("div",{style:{fontSize:14,lineHeight:1.7}},tip.tip))
        )
      );
    }),
    h(Btn,{onClick:function(){props.onDone(0);}},"✓ Li tudo · Continuar")
  );
}

// ═══════════════════════════════════════════════════════
// APP PRINCIPAL
// ═══════════════════════════════════════════════════════
function App(){
  var _s1=useState("dash");  var screen=_s1[0]; var setScreen=_s1[1];
  var _s2=useState(null);    var ex=_s2[0];     var setEx=_s2[1];
  var _s3=useState(0);       var xp=_s3[0];     var setXP=_s3[1];
  var _s4=useState([]);      var done=_s4[0];   var setDone=_s4[1];
  function start(id){setEx(id);setScreen("ex");}
  function finish(gained){
    setXP(function(x){return x+gained;});
    setDone(function(d){return d.concat([ex]);});
    setScreen("dash");setEx(null);
  }
  var names={
    "read-select":"👁 Read & Select","read-complete":"✏️ Read & Complete",
    "vocabulary":"📖 Vocabulary","sentence":"📝 Sentence Completion",
    "error":"🔍 Error Correction","wordorder":"🔀 Word Order",
    "writing":"🖊 Writing Practice","tips":"💡 Estratégias"
  };
  var score=estScore(xp);
  return h("div",{style:{minHeight:"100vh",background:C.bg,paddingBottom:80}},
    // Header
    h("div",{style:{background:"linear-gradient(135deg,#0d1127,#111a35)",borderBottom:"1px solid "+C.border,
      padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",
      position:"sticky",top:0,zIndex:100}},
      h("div",null,
        h("div",{style:{fontSize:20,fontWeight:900,color:C.accent,letterSpacing:-.5}},"DET·Study"),
        h("div",{style:{fontSize:10,color:C.muted,fontWeight:600,letterSpacing:1}},"DUOLINGO ENGLISH TEST PREP")
      ),
      h("div",{style:{display:"flex",gap:10}},
        [[xp+"xp","XP",C.accent],[score+" pts","DET",score>=60?C.green:C.yellow],[done.length,"FEITOS",C.blue]].map(function(item){
          return h("div",{key:item[1],style:{padding:"4px 12px",borderRadius:10,textAlign:"center",
            background:item[2]+"10",border:"1px solid "+item[2]+"25"}},
            h("div",{style:{fontSize:16,fontWeight:800,color:item[2],lineHeight:1}},item[0]),
            h("div",{style:{fontSize:10,color:C.muted,fontWeight:600}},item[1]));
        })
      )
    ),
    // Barra voltar
    screen==="ex"&&h("div",{style:{padding:"10px 24px",background:C.surface,
      borderBottom:"1px solid "+C.border,display:"flex",alignItems:"center",gap:12}},
      h(Btn,{variant:"ghost",style:{padding:"6px 12px",fontSize:13},onClick:function(){setScreen("dash");setEx(null);}},
        "← Voltar"),
      h("span",{style:{fontSize:14,color:C.muted}},names[ex]||"")
    ),
    // Conteúdo
    h("div",{style:{maxWidth:780,margin:"0 auto",padding:"24px 16px"}},
      screen==="dash"&&h(Dashboard,{xp:xp,onStart:start,completed:done}),
      screen==="ex"&&ex==="read-select"  &&h(ReadSelect,      {onDone:finish}),
      screen==="ex"&&ex==="read-complete"&&h(ReadComplete,    {onDone:finish}),
      screen==="ex"&&ex==="vocabulary"   &&h(Vocabulary,      {onDone:finish}),
      screen==="ex"&&ex==="sentence"     &&h(SentenceCompletion,{onDone:finish}),
      screen==="ex"&&ex==="error"        &&h(ErrorCorrection, {onDone:finish}),
      screen==="ex"&&ex==="wordorder"    &&h(WordOrder,       {onDone:finish}),
      screen==="ex"&&ex==="writing"      &&h(Writing,         {onDone:finish}),
      screen==="ex"&&ex==="tips"         &&h(Tips,            {onDone:finish})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
</html>
